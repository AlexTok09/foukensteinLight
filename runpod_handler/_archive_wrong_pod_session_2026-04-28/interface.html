<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Foukenstein TTS — Test bench</title>
<style>
  :root {
    --bg: #0e0e10;
    --panel: #18181b;
    --border: #2a2a2e;
    --fg: #e4e4e7;
    --muted: #8b8b93;
    --accent: #f97316;
    --ok: #22c55e;
    --warn: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.45 ui-sans-serif, -apple-system, "Segoe UI", system-ui;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }
  main {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 0;
    height: calc(100vh - 53px);
  }
  .panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 18px;
  }
  .right {
    overflow-y: auto;
    padding: 18px 24px;
  }
  h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  h2:not(:first-child) { margin-top: 22px; }
  .row {
    display: grid;
    grid-template-columns: 1fr 80px;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .row label {
    font-size: 12px;
    color: var(--fg);
  }
  .row .hint { display: block; color: var(--muted); font-size: 11px; }
  .row input[type=number] {
    width: 100%;
    background: #0a0a0c;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 7px;
    font: 12px ui-monospace, Menlo, monospace;
    text-align: right;
  }
  .row input[type=number]:focus {
    outline: none;
    border-color: var(--accent);
  }
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 18px;
  }
  button {
    background: var(--accent);
    border: none;
    color: #fff;
    font: 600 13px ui-sans-serif, system-ui;
    padding: 9px 14px;
    border-radius: 5px;
    cursor: pointer;
  }
  button.ghost {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .text-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 18px;
  }
  .text-block-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .text-block-head .title {
    font-weight: 600;
    font-size: 13px;
  }
  .text-block-head .topic {
    color: var(--muted);
    font-size: 12px;
    margin-left: 8px;
    font-weight: 400;
  }
  .chunk {
    display: grid;
    grid-template-columns: 22px 1fr 50px;
    align-items: start;
    gap: 8px;
    margin-bottom: 6px;
  }
  .chunk .idx {
    color: var(--muted);
    font: 11px ui-monospace, Menlo, monospace;
    padding-top: 9px;
    text-align: right;
  }
  .chunk textarea {
    width: 100%;
    min-height: 40px;
    background: #0a0a0c;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    font: 13px ui-sans-serif, system-ui;
    resize: vertical;
  }
  .chunk textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .chunk .count {
    text-align: right;
    color: var(--muted);
    font: 11px ui-monospace, Menlo, monospace;
    padding-top: 9px;
  }
  .chunk .count.warn { color: var(--warn); }

  .play-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .play-row audio { flex: 1; }
  .meta {
    color: var(--muted);
    font: 11px ui-monospace, Menlo, monospace;
    margin-top: 6px;
  }
  .status {
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }
  .status.show { display: block; }
  .status.err { background: #2b1212; color: #fca5a5; border: 1px solid #5a1f1f; }
  .status.ok  { background: #112b1a; color: #86efac; border: 1px solid #1f5a32; }
  .status.run { background: #1a1a2b; color: #a5b4fc; border: 1px solid #2f2f5a; }
</style>
</head>
<body>

<header>
  <h1>Foukenstein TTS — Test bench</h1>
  <span class="sub">3 textes × 5 chunks · params live · XTTS v2</span>
</header>

<main>

  <!-- ── PANEL GAUCHE : PARAMETRES ────────────────────────────────────── -->
  <aside class="panel">

    <h2>Stitching</h2>
    <div class="row">
      <label>XFADE_MS<span class="hint">crossfade entre chunks</span></label>
      <input type="number" id="xfade_ms" value="320" min="0" max="2000" step="10">
    </div>
    <div class="row">
      <label>EDGE_FADE_MS<span class="hint">fade in/out par chunk</span></label>
      <input type="number" id="edge_fade_ms" value="80" min="0" max="500" step="10">
    </div>
    <div class="row">
      <label>PAUSE_MS<span class="hint">silence entre phrases</span></label>
      <input type="number" id="pause_ms" value="160" min="0" max="2000" step="10">
    </div>
    <div class="row">
      <label>MICRO_PAUSE_MS<span class="hint">micro-silence sous-chunk</span></label>
      <input type="number" id="micro_pause_ms" value="40" min="0" max="500" step="10">
    </div>
    <div class="row">
      <label>TAIL_SILENCE_MS<span class="hint">silence final</span></label>
      <input type="number" id="tail_silence_ms" value="700" min="0" max="3000" step="10">
    </div>
    <div class="row">
      <label>FADE_OUT_MS<span class="hint">fade out final</span></label>
      <input type="number" id="fade_out_ms" value="80" min="0" max="500" step="10">
    </div>

    <h2>Inference</h2>
    <div class="row">
      <label>TEMPERATURE<span class="hint">0.0 → 1.5</span></label>
      <input type="number" id="temperature" value="0.65" min="0" max="2" step="0.05">
    </div>
    <div class="row">
      <label>LENGTH_PENALTY</label>
      <input type="number" id="length_penalty" value="1.0" min="0" max="5" step="0.1">
    </div>
    <div class="row">
      <label>REPETITION_PENALTY</label>
      <input type="number" id="repetition_penalty" value="2.0" min="1" max="10" step="0.1">
    </div>
    <div class="row">
      <label>TOP_K</label>
      <input type="number" id="top_k" value="50" min="0" max="500" step="1">
    </div>
    <div class="row">
      <label>TOP_P</label>
      <input type="number" id="top_p" value="0.85" min="0" max="1" step="0.05">
    </div>

    <div class="actions">
      <button class="ghost" id="reset-btn">Reset défauts</button>
    </div>

    <p class="meta" style="margin-top: 18px;">
      Defaults = repo
      <code style="color:#fde68a">handler.py</code>
    </p>

  </aside>

  <!-- ── PANEL DROIT : 3 TEXTES ───────────────────────────────────────── -->
  <section class="right">

    <div id="texts"></div>

  </section>

</main>

<script>
// ── Trois textes Foukenstein, 5 chunks chacun ──────────────────────────────
// Style : déclaratif foucaldien + angle politique-collectif, ~100-220 chars
const TEXTS = [
  {
    id: "t1",
    title: "Texte 1",
    topic: "le pouvoir",
    chunks: [
      "Le pouvoir n'est pas une chose qu'on possède, c'est un rapport mobile qui circule entre les corps, les institutions et les algorithmes.",
      "Il ne descend pas d'en haut comme un commandement, il monte d'en bas, des micro-gestes répétés que personne n'a décrétés.",
      "Quand je parle de gouvernement, je ne parle pas de l'État seul, mais de toutes les techniques qui conduisent nos conduites.",
      "Les normes ne nous interdisent pas d'abord, elles nous fabriquent : elles façonnent nos désirs avant même que nous les formulions.",
      "Comprendre le pouvoir, c'est repérer où il s'investit dans nos corps, et collectivement apprendre à en redistribuer les effets.",
    ],
  },
  {
    id: "t2",
    title: "Texte 2",
    topic: "la contre-conduite",
    chunks: [
      "Je ne crois pas aux grands gestes héroïques de la résistance, je crois aux micro-déplacements qui érodent l'ordre sans bruit.",
      "Payer en cash plutôt qu'avec une carte traçable, refuser un capteur, marcher au lieu de scroller : ce sont déjà des contre-conduites.",
      "La résistance ne réclame ni martyrs ni avant-garde, elle réclame des collectifs qui détournent les outils du quotidien.",
      "Chaque dispositif que le pouvoir nous tend pour mieux nous lire peut être lu à rebours, retourné, désajusté en commun.",
      "La politique ne se joue pas seulement dans les urnes, elle se joue dans les cuisines, les cages d'escalier et les groupes WhatsApp.",
    ],
  },
  {
    id: "t3",
    title: "Texte 3",
    topic: "le sujet et la norme",
    chunks: [
      "Nous ne sommes pas des sujets libres qui rencontreraient ensuite le pouvoir, nous sommes des sujets que le pouvoir a produits.",
      "La norme ne se contente pas de juger : elle classe, elle gradue, elle fabrique du déviant pour mieux fabriquer du normal.",
      "Quand un algorithme nous note, il ne décrit pas un état, il prescrit une trajectoire dont chacun ressent silencieusement le poids.",
      "Refuser cette fabrication n'est pas un acte intérieur, c'est une pratique collective qui invente d'autres manières de se compter.",
      "Devenir sujet politique, ce n'est pas s'affirmer contre les autres, c'est se rendre capable, avec eux, de désobéir aux mesures qu'on subit.",
    ],
  },
];

// ── Defaults (repo handler.py) ────────────────────────────────────────────
const DEFAULTS = {
  xfade_ms: 320, edge_fade_ms: 80, pause_ms: 160, micro_pause_ms: 40,
  tail_silence_ms: 700, fade_out_ms: 80,
  temperature: 0.65, length_penalty: 1.0, repetition_penalty: 2.0,
  top_k: 50, top_p: 0.85,
};

// ── DOM build ─────────────────────────────────────────────────────────────
const root = document.getElementById("texts");
TEXTS.forEach((t) => {
  const el = document.createElement("div");
  el.className = "text-block";
  el.innerHTML = `
    <div class="text-block-head">
      <div>
        <span class="title">${t.title}</span>
        <span class="topic">— ${t.topic}</span>
      </div>
      <div>
        <button class="ghost" data-action="reset-text" data-id="${t.id}">Reset texte</button>
        <button data-action="synth" data-id="${t.id}">Synthétiser</button>
      </div>
    </div>
    <div class="chunks" id="chunks-${t.id}"></div>
    <div class="status" id="status-${t.id}"></div>
    <div class="play-row">
      <audio id="audio-${t.id}" controls></audio>
      <a id="dl-${t.id}" class="ghost" style="display:none; padding:6px 10px; border:1px solid var(--border); border-radius:4px; text-decoration:none; color:var(--fg); font-size:12px;">⬇ WAV</a>
    </div>
    <div class="meta" id="meta-${t.id}"></div>
  `;
  root.appendChild(el);
  renderChunks(t);
});

function renderChunks(t) {
  const wrap = document.getElementById(`chunks-${t.id}`);
  wrap.innerHTML = "";
  t.chunks.forEach((c, i) => {
    const row = document.createElement("div");
    row.className = "chunk";
    row.innerHTML = `
      <div class="idx">${i + 1}</div>
      <textarea data-text-id="${t.id}" data-chunk-idx="${i}">${c}</textarea>
      <div class="count" id="count-${t.id}-${i}">${c.length}</div>
    `;
    wrap.appendChild(row);
  });
  wrap.querySelectorAll("textarea").forEach((ta) => {
    const update = () => {
      const id  = ta.dataset.textId;
      const idx = +ta.dataset.chunkIdx;
      const cnt = document.getElementById(`count-${id}-${idx}`);
      cnt.textContent = ta.value.length;
      cnt.classList.toggle("warn", ta.value.length > 230);
    };
    ta.addEventListener("input", update);
    update();
  });
}

// ── Buttons ───────────────────────────────────────────────────────────────
document.body.addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === "synth") synth(btn.dataset.id);
  if (action === "reset-text") resetText(btn.dataset.id);
});

document.getElementById("reset-btn").addEventListener("click", () => {
  for (const k in DEFAULTS) {
    const el = document.getElementById(k);
    if (el) el.value = DEFAULTS[k];
  }
});

function resetText(id) {
  const orig = TEXTS.find((t) => t.id === id);
  // Re-fetch original chunks from the const (texts are mutable in-DOM only, source const is intact)
  // The const holds the original strings, so we just re-render
  const fresh = JSON.parse(JSON.stringify(orig));
  renderChunks(fresh);
}

function setStatus(id, text, kind) {
  const el = document.getElementById(`status-${id}`);
  el.className = `status show ${kind}`;
  el.textContent = text;
}
function clearStatus(id) {
  document.getElementById(`status-${id}`).className = "status";
}

async function synth(id) {
  const textareas = document.querySelectorAll(`#chunks-${id} textarea`);
  const chunks = Array.from(textareas).map((ta) => ta.value.trim()).filter(Boolean);
  if (!chunks.length) {
    setStatus(id, "Aucun chunk.", "err");
    return;
  }

  const params = {};
  for (const k in DEFAULTS) {
    const el = document.getElementById(k);
    params[k] = el && el.value !== "" ? +el.value : DEFAULTS[k];
  }

  const btn = document.querySelector(`button[data-action="synth"][data-id="${id}"]`);
  btn.disabled = true;
  setStatus(id, "Synthèse en cours…", "run");
  document.getElementById(`meta-${id}`).textContent = "";

  const t0 = performance.now();
  try {
    const r = await fetch("/synthesize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chunks, language: "fr", ...params }),
    });
    const data = await r.json();
    const elapsed = Math.round(performance.now() - t0);

    if (data.error) {
      setStatus(id, `Erreur : ${data.error}`, "err");
      return;
    }

    const blob = b64ToBlob(data.audio_base64, "audio/wav");
    const url  = URL.createObjectURL(blob);
    const audio = document.getElementById(`audio-${id}`);
    audio.src = url;
    audio.play().catch(() => {});

    const dl = document.getElementById(`dl-${id}`);
    dl.href = url;
    dl.download = `${id}_${Date.now()}.wav`;
    dl.style.display = "inline-block";

    const dur = data.duration_ms ?? "?";
    const elap = data.elapsed_ms ?? elapsed;
    document.getElementById(`meta-${id}`).innerHTML =
      `audio=<b>${dur}ms</b>  ·  synth=<b>${elap}ms</b>  ·  ` +
      `XFADE=${params.xfade_ms} EDGE=${params.edge_fade_ms} PAUSE=${params.pause_ms} ` +
      `T=${params.temperature} TOPK=${params.top_k} TOPP=${params.top_p} REP=${params.repetition_penalty}`;

    setStatus(id, "OK", "ok");
    setTimeout(() => clearStatus(id), 1500);
  } catch (err) {
    setStatus(id, `Erreur réseau : ${err.message}`, "err");
  } finally {
    btn.disabled = false;
  }
}

function b64ToBlob(b64, mime) {
  const bin = atob(b64);
  const len = bin.length;
  const buf = new Uint8Array(len);
  for (let i = 0; i < len; i++) buf[i] = bin.charCodeAt(i);
  return new Blob([buf], { type: mime });
}
</script>
</body>
</html>
